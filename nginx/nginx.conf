worker_processes auto;
worker_rlimit_nofile 65535;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Cloudflare Real IP Restoration ----------
    # When behind Cloudflare proxy (orange cloud), $remote_addr is Cloudflare's IP.
    # These directives restore the real visitor IP from CF-Connecting-IP header.
    # This is CRITICAL for rate limiting and logging to work correctly.
    # Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4/)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # Cloudflare IPv6 ranges (https://www.cloudflare.com/ips-v6/)
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    # Use CF-Connecting-IP header (most reliable from Cloudflare)
    # Falls back gracefully: if not behind CF, $remote_addr stays unchanged
    real_ip_header CF-Connecting-IP;
    # If you're NOT using Cloudflare, comment out the above block.
    # The set_real_ip_from directives only affect traffic from those IP ranges,
    # so direct (non-CF) traffic is unaffected and remains safe.

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Performance ----------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 50m;
    server_tokens off;

    # Buffers — prevents disk I/O for moderate responses
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    # Open file cache — reduces syscalls for static assets
    open_file_cache max=1000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/wasm font/woff2;

    # ---------- Rate Limiting ----------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_status 429;

    # ---------- Security Headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---------- WebSocket detection ----------
    # When client sends Upgrade header → Connection = "upgrade"
    # Otherwise → Connection = "" (enables keepalive to upstream)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # ---------- Upstream with keepalive ----------
    # Use Docker's internal DNS resolver so nginx picks up new container IPs
    # after restarts (prevents stale-IP 502 errors).
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    upstream backend {
        server backend:4000;
        keepalive 32;
    }

    # ---------- HTTP → HTTPS redirect (uncomment when SSL is ready) ----------
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ---------- Main Server ----------
    server {
        listen 80;
        # listen 443 ssl http2;  # Uncomment for SSL (self-managed or Cloudflare Full/Strict)
        server_name _;

        # --- SSL Configuration ---
        # Choose ONE of these modes:
        #
        # MODE 1: Cloudflare Flexible (easiest — no certs needed on nginx)
        #   → Cloudflare SSL/TLS → Encryption mode → Flexible
        #   → Leave everything below commented out. Traffic: User ⇄ HTTPS ⇄ CF ⇄ HTTP ⇄ nginx:80
        #
        # MODE 2: Cloudflare Full (Strict) — RECOMMENDED for production
        #   → Generate a Cloudflare Origin Certificate:
        #     Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
        #     → Save the cert as nginx/ssl/fullchain.pem
        #     → Save the key  as nginx/ssl/privkey.pem
        #   → Uncomment "listen 443 ssl http2" above AND uncomment the block below:
        #
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        #
        # MODE 3: Self-managed SSL (Let's Encrypt / custom certs)
        #   → Same as Mode 2 but use your own cert/key files in nginx/ssl/

        # --- Server console WebSocket (no rate limit — long-lived connection) ---
        location ~ ^/api/servers/[^/]+/ws$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # --- API (backend) ---
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (server console) + keepalive for normal requests
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # --- Auth session check (relaxed rate limit — called on every page load) ---
        location = /api/auth/me {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # --- Auth routes (stricter rate limit for login/register/password) ---
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # --- Frontend (default) ---
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Prevent browser/CDN from caching HTML pages (they reference hashed JS chunks)
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # --- Static assets caching ---
        # Next.js content-hashes these filenames — safe to cache forever.
        # Each rebuild produces new hashes → browsers fetch fresh chunks.
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # --- Dynamic data routes (client-side navigation) ---
        # /_next/data/<buildId>/*.json — must not be cached so page
        # transitions always fetch the latest server-rendered data.
        location /_next/data/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # --- Favicon / robots / manifest caching ---
        location ~* ^/(favicon\.ico|robots\.txt|manifest\.json)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }
    }
}
