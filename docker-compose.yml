services:
  postgres:
    image: postgres:16-alpine
    container_name: gamehost-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-gamehost}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gamehost_secret}
      POSTGRES_DB: ${DB_NAME:-gamehost}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-gamehost}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gamehost-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-gamehost_redis}
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-gamehost_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamehost-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-gamehost}:${DB_PASSWORD:-gamehost_secret}@postgres:5432/${DB_NAME:-gamehost}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-gamehost_redis}@redis:6379
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: gamehost-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: gamehost-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
